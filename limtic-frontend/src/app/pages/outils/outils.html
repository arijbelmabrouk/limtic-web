<div class="page">
  <div class="page-header">
    <h1>Outils & Logiciels</h1>
    <p>Outils développés par le laboratoire LIMTIC</p>
  </div>
  <div class="outils-grid">
    @for (o of outils(); track o.id) {
      <div class="outil-card">
        <div class="outil-header">
          <div class="outil-icon">🛠️</div>
          <span class="outil-statut" [class]="o.statut === 'Disponible' ? 'statut-ok' : 'statut-dev'">
            {{ o.statut }}
          </span>
        </div>
        <h3>{{ o.nom }}</h3>
        <p>{{ o.description }}</p>
        <span class="outil-type">{{ o.type }}</span>
        @if (o.lienGithub) {
          <a [href]="o.lienGithub" target="_blank" class="github-link">⬡ GitHub →</a>
        }
      </div>
    }
  </div>
</div>
