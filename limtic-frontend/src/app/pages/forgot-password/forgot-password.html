<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">⬡</span>
      <h1>LIMTIC</h1>
      <p>Réinitialisation du mot de passe</p>
    </div>

    <div class="auth-form">
      @if (erreur()) {
        <div class="error-msg">⚠️ {{ erreur() }}</div>
      }
      @if (message()) {
        <div class="success-msg">✅ {{ message() }}</div>
      }

      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="votre@email.tn" />
      </div>

      <button class="btn-submit" (click)="onSubmit()" [disabled]="loading()">
        {{ loading() ? 'Envoi...' : 'Envoyer le lien' }}
      </button>

      <a routerLink="/login" class="forgot-link">Retour à la connexion</a>
    </div>
  </div>
</div>
