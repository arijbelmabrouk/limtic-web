<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">⬡</span>
      <h1>{{ settings.acronyme() }}</h1>
      <p>Nouveau mot de passe</p>
    </div>

    <div class="auth-form">
      @if (erreur()) {
        <div class="error-msg">⚠️ {{ erreur() }}</div>
      }
      @if (message()) {
        <div class="success-msg">✅ {{ message() }}</div>
      }

      <div class="field">
        <label>Nouveau mot de passe</label>
        <input type="password" [(ngModel)]="motDePasse" placeholder="••••••••" />
      </div>

      <div class="field">
        <label>Confirmer le mot de passe</label>
        <input type="password" [(ngModel)]="confirmation" placeholder="••••••••" />
      </div>

      <button class="btn-submit" (click)="onSubmit()" [disabled]="loading() || !token">
        {{ loading() ? 'Enregistrement...' : 'Réinitialiser' }}
      </button>

      <a routerLink="/login" class="forgot-link">Retour à la connexion</a>
    </div>
  </div>
</div>
