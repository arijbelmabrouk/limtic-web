<div class="page">
  <div class="page-header">
    <h1>Nos Chercheurs</h1>
    <p>Découvrez les membres de notre équipe de recherche</p>
  </div>

  <div class="cards-grid">
    @for (c of chercheurs(); track c.id) {
      <div class="card" [routerLink]="['/chercheurs', c.id]">
        <div class="card-avatar">{{ c.prenom[0] }}{{ c.nom[0] }}</div>
        <div class="card-info">
          <h3>{{ c.prenom }} {{ c.nom }}</h3>
          <span class="grade">{{ c.grade }}</span>
          <span class="institution">{{ c.institution }}</span>
          <div class="specialite">🔬 {{ c.specialite }}</div>
          <div class="pub-count">{{ c.publications?.length || 0 }} publication(s)</div>
        </div>
        <div class="card-footer">Voir profil →</div>
      </div>
    }
  </div>
</div>
