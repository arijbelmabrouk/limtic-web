<div class="page">
  <div class="page-header">
    <h1>Publications</h1>
    <p>Travaux scientifiques du laboratoire LIMTIC</p>
  </div>
  <div class="pub-list">
    @for (p of publications(); track p.id) {
      <div class="pub-card">
        <div class="pub-type" [class]="p.type === 'Journal' ? 'type-journal' : 'type-conf'">
          {{ p.type }}
        </div>
        <div class="pub-body">
          <h3>{{ p.titre }}</h3>
          <p class="pub-meta">{{ p.journal }} — {{ p.annee }}</p>
          <p class="pub-resume">{{ p.resume }}</p>
          @if (p.axe) {
            <span class="pub-axe">🔬 {{ p.axe.nom }}</span>
          }
        </div>
        <div class="pub-year">{{ p.annee }}</div>
      </div>
    }
  </div>
</div>
