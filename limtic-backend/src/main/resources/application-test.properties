# ── Profil test — H2 en mémoire (pas besoin de PostgreSQL pour les tests) ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Désactiver SSL pour les tests
server.ssl.enabled=false
server.port=8080

# Mail factice (pas d'envoi réel)
spring.mail.host=localhost
spring.mail.port=25

# hCaptcha — toujours valide en test
hcaptcha.secret=0x0000000000000000000000000000000000000000
