spring.application.name=limtic-backend

# ── HTTPS ──────────────────────────────────────────────────
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=limtic2024
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=limtic

# ── Base de données ────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/limtic_db
spring.datasource.username=postgres
spring.datasource.password=0000
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Session ────────────────────────────────────────────────
# Durée de vie de la session : 24h
server.servlet.session.timeout=86400s
# Cookie HttpOnly = JS ne peut pas lire → protège contre XSS
server.servlet.session.cookie.http-only=true
# Cookie Secure = envoyé uniquement en HTTPS (nécessaire pour SameSite=None)
server.servlet.session.cookie.secure=true
# SameSite=None = cookie envoyé pour XHR cross-origin depuis le front local
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.name=LIMTIC_SESSION

