spring.application.name=limtic-backend

# ── HTTPS ──────────────────────────────────────────────────────────────────
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=limtic

# ── Base de données ─────────────────────────────────────────────────────────
# ⚠️  NE JAMAIS COMMITTER DE MOT DE PASSE EN CLAIR.
# Définir ces variables d'environnement sur la machine de déploiement :
#   export DB_PASSWORD=VotreMotDePassePostgres
#   export SMTP_PASSWORD=xxxx xxxx xxxx xxxx
#   export SSL_KEYSTORE_PASSWORD=limtic2024
#   export JWT_SECRET=...  (si réintroduit plus tard)
spring.datasource.url=jdbc:postgresql://localhost:5432/limtic_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
# Désactiver en production (verbose et lent)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── Upload de fichiers (multipart pour les photos d'événements) ─────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB

# Répertoire de stockage des uploads (relatif au jar)
app.upload.dir=uploads/

# ── Session ─────────────────────────────────────────────────────────────────
server.servlet.session.timeout=86400s
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.name=LIMTIC_SESSION

# ── Mail ─────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
# ⚠️ Accès protégé par rôle ADMIN dans SecurityConfig — ne plus permettre l'accès public.
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/api-docs

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.tn.limtic=INFO
logging.level.org.springframework.security=WARN

# ── Captcha ──────────────────────────────────────────────────────────────────
hcaptcha.secret=${HCAPTCHA_SECRET}